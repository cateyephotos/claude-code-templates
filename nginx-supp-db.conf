server {
    listen 8080;
    server_name localhost;

    # Docker's internal DNS — required for lazy upstream resolution via variables
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html-dist;
    index index.html;

    # ── Security Headers ────────────────────────────────────────
    # Content Security Policy — allow Clerk, Convex, PostHog, unpkg CDN
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://*.clerk.accounts.dev https://challenges.cloudflare.com https://cdn.jsdelivr.net https://us.i.posthog.com https://us-assets.i.posthog.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: blob: https://*.clerk.com https://img.clerk.com https://*.gravatar.com; connect-src 'self' https://*.convex.cloud wss://*.convex.cloud https://*.clerk.accounts.dev https://clerk.supplementdb.com https://api.clerk.com https://us.i.posthog.com https://us.posthog.com; frame-src 'self' https://*.clerk.accounts.dev https://challenges.cloudflare.com; worker-src 'self' blob:;" always;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Compression ─────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ── Static Asset Caching ────────────────────────────────────
    # Images/fonts: safe to cache aggressively (content rarely changes)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # JS/CSS: revalidate on every request via ETag so hot-reload and deployments
    # are picked up immediately without browser hard-refresh.
    # `no-cache` does NOT mean "don't cache" — it means "cache but always check
    # with server first (ETag/Last-Modified)". Nginx returns 304 when unchanged.
    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Disable caching for HTML (so changes reflect immediately)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Admin Dashboard ─────────────────────────────────────────
    # Admin pages — client-side RBAC enforced in JS (canAccessAdmin check)
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Evidence Guide Pages ────────────────────────────────────
    # Clean URLs (/guides/sleep → /guides/sleep.html)
    location /guides/ {
        try_files $uri $uri.html $uri/ =404;
    }

    # ── Convex Functions (data directory) ───────────────────────
    # Block direct access to Convex source files
    location /convex/ {
        return 404;
    }

    # Block access to scripts directory
    location /scripts/ {
        return 404;
    }

    # Block dotfiles and sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* (\.env|package\.json|tsconfig\.json|docker-entrypoint\.sh)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── PDF Generator Proxy ─────────────────────────────────────
    # Proxies /pdf-api/* → pdf-generator service on :3001
    # Strips the /pdf-api prefix so the service sees clean paths:
    #   /pdf-api/generate → /generate
    #   /pdf-api/health   → /health
    #
    # NOTE: Use Docker's embedded DNS resolver (127.0.0.11) with a variable so
    # nginx resolves the upstream lazily at request time rather than at startup.
    # Without this, nginx fails to start when pdf-generator isn't yet running.
    location /pdf-api/ {
        set $pdf_upstream http://pdf-generator:3001;
        # Strip /pdf-api prefix before proxying
        rewrite ^/pdf-api/(.*)$ /$1 break;
        proxy_pass $pdf_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # PDF responses can be large — give generous timeouts
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        # Disable buffering so binary PDF streams are forwarded immediately
        proxy_buffering off;

        # No caching for dynamic PDF generation
        add_header Cache-Control "no-store" always;
    }

    # ── Main App ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health Check ────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
